<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIIZE 物料站</title>
<style>

  :root {
    --bg: transparent;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #888;
    --text-faint: #BBB;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.18);
    --accent: #C9563A;
    --accent-soft: #FAF0ED;
    --mono: 'DM Mono', monospace;
    --sans: 'LXGW WenKai TC', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #49586B 0%, #5082C9 35%, #8BA6BF 65%, #93A3C5 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── header ── */
  header {
    padding: 3rem 2rem 1.5rem;
    max-width: 720px;
    margin: 0 auto;
  }
  .site-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.15;
  }
  .site-desc {
    margin-top: 0.5rem;
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ── date nav ── */
  .date-nav-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
  }
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .date-nav::-webkit-scrollbar { display: none; }

  .nav-arrow {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--text-muted);
    transition: border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .nav-arrow:hover { border-color: var(--border-hover); color: var(--text); }

  .date-chips {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .date-chips::-webkit-scrollbar { display: none; }

  .date-chip {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .date-chip:hover { border-color: var(--border-hover); color: var(--text); }
  .date-chip.active {
    background: var(--text);
    color: var(--surface);
    border-color: var(--text);
  }

  /* ── main layout ── */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  /* ── day block ── */
  .day-block { margin-bottom: 2.5rem; }

  .day-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }
  .day-date {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .day-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  /* ── link list ── */
  .link-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── link card with dual links ── */
  .link-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .link-card:hover { border-color: var(--border-hover); }

  .link-card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px 8px;
  }
  .platform-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-youtube   { background: #FAF0ED; color: #993C1D; }
  .badge-weibo     { background: #E6F1FB; color: #185FA5; }
  .badge-bubble    { background: #FBEAF0; color: #993556; }
  .badge-vlive     { background: #EEEDFE; color: #3C3489; }
  .badge-tiktok    { background: #F1EFE8; color: #5F5E5A; }
  .badge-instagram { background: #FBEAF0; color: #72243E; }
  .badge-weverse   { background: #EAF3DE; color: #3B6D11; }
  .badge-other     { background: #F1EFE8; color: #5F5E5A; }

  .link-title {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
  }

  /* dual link buttons */
  .link-buttons {
    display: flex;
    gap: 0;
    border-top: 0.5px solid var(--border);
  }
  .link-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 10px;
    text-decoration: none;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    background: transparent;
    transition: background 0.12s, color 0.12s;
  }
  .link-btn:hover { background: var(--bg); color: var(--text); }
  .link-btn + .link-btn { border-left: 0.5px solid var(--border); }

  .link-btn-yt:hover  { color: #993C1D; }
  .link-btn-bili:hover { color: #185FA5; }

  .link-btn svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
  }

  /* single link (no bilibili) */
  .link-btn-single {
    width: 100%;
    justify-content: flex-start;
    padding-left: 14px;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--mono);
  }

  /* ── footer ── */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-faint);
    border-top: 0.5px solid var(--border);
    max-width: 720px;
    margin: 0 auto;
  }

  @media (max-width: 480px) {
    header, .date-nav-wrap { padding-left: 1.25rem; padding-right: 1.25rem; }
    main { padding: 0 1.25rem 3rem; }
    h1 { font-size: 26px; }
  }
</style>

/* ── icons ── */
const ICON_YT = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>`;

/* ── helpers ── */
function platformClass(p) {
  const map = { YouTube:'youtube', Weibo:'weibo', Bubble:'bubble', Vlive:'vlive', TikTok:'tiktok', Instagram:'instagram', Weverse:'weverse' };
  return 'badge-' + (map[p] || 'other');
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
}

function formatChip(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
}

/* ── group & sort ── */
const groups = {};
DATA.forEach(item => {
  if (!groups[item.date]) groups[item.date] = [];
  groups[item.date].push(item);
});
const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

/* ── render date chips ── */
const chipsEl = document.getElementById('date-chips');
dates.forEach((date, i) => {
  const chip = document.createElement('button');
  chip.className = 'date-chip' + (i === 0 ? ' active' : '');
  chip.textContent = formatChip(date);
  chip.dataset.date = date;
  chip.addEventListener('click', () => scrollToDate(date));
  chipsEl.appendChild(chip);
});

/* ── scroll nav arrows ── */
document.getElementById('nav-prev').addEventListener('click', () => {
  chipsEl.scrollBy({ left: -120, behavior: 'smooth' });
});
document.getElementById('nav-next').addEventListener('click', () => {
  chipsEl.scrollBy({ left: 120, behavior: 'smooth' });
});

/* ── render main content ── */
const main = document.getElementById('main');
main.innerHTML = dates.map(date => {
  const items = groups[date];
  const cards = items.map(item => {
    const hasBili = !!item.bili;
    const hasYt   = !!item.yt;
    const bothLinks = hasBili && hasYt;

    let buttonsHtml = '';
    if (bothLinks) {
      buttonsHtml = `
        <div class="link-buttons">
          <a class="link-btn link-btn-yt" href="${item.yt}" target="_blank" rel="noopener">
            ${ICON_YT} YouTube
          </a>
          <a class="link-btn link-btn-bili" href="${item.bili}" target="_blank" rel="noopener">
            ${ICON_BILI} B站
          </a>
        </div>`;
    } else if (hasYt) {
      buttonsHtml = `
        <div class="link-buttons">
          <a class="link-btn link-btn-yt link-btn-single" href="${item.yt}" target="_blank" rel="noopener">
            ${ICON_YT} YouTube ${ICON_EXT}
          </a>
        </div>`;
    } else if (hasBili) {
      buttonsHtml = `
        <div class="link-buttons">
          <a class="link-btn link-btn-bili link-btn-single" href="${item.bili}" target="_blank" rel="noopener">
            ${ICON_BILI} B站 ${ICON_EXT}
          </a>
        </div>`;
    }

    return `
      <div class="link-card">
        <div class="link-card-top">
          <span class="platform-badge ${platformClass(item.platform)}">${item.platform}</span>
          <span class="link-title">${item.title}</span>
        </div>
        ${buttonsHtml}
      </div>`;
  }).join('');

  return `
    <div class="day-block" id="day-${date}">
      <div class="day-header">
        <span class="day-date">${formatDate(date)}</span>
        <span class="day-count">${items.length} 条</span>
      </div>
      <div class="link-list">${cards}</div>
    </div>`;
}).join('');

/* ── scroll to date + update active chip ── */
function scrollToDate(date) {
  const el = document.getElementById('day-' + date);
  if (!el) return;
  const navH = document.querySelector('.date-nav-wrap').offsetHeight + 16;
  const top = el.getBoundingClientRect().top + window.scrollY - navH;
  window.scrollTo({ top, behavior: 'smooth' });
  document.querySelectorAll('.date-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.date === date);
  });
  const chip = chipsEl.querySelector(`[data-date="${date}"]`);
  if (chip) chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

/* ── update active chip on scroll ── */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const date = entry.target.id.replace('day-', '');
      document.querySelectorAll('.date-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.date === date);
      });
    }
  });
}, { threshold: 0.3, rootMargin: '-80px 0px -60% 0px' });

dates.forEach(date => {
  const el = document.getElementById('day-' + date);
  if (el) observer.observe(el);
});
</script>

<button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 0.5px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.8);
  font-size: 18px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.3s, background 0.2s;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
">↑</button>

<script>
window.addEventListener('scroll', function() {
  document.getElementById('top-btn').style.opacity = window.scrollY > 300 ? '1' : '0';
});
document.getElementById('top-btn').addEventListener('mouseenter', function() {
  this.style.background = 'rgba(255,255,255,0.35)';
});
document.getElementById('top-btn').addEventListener('mouseleave', function() {
  this.style.background = 'rgba(255,255,255,0.2)';
});
</script>
</body>
</html>
